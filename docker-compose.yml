services:

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.26-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl-params.conf:/etc/nginx/ssl-params.conf:ro
      - app_public:/var/www/html/public:ro
      - app_storage_public:/var/www/html/storage/app/public:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # ── Laravel app (PHP-FPM) ────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    environment:
      CONTAINER_ROLE: app
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
      - app_public:/var/www/html/public
      - app_storage_public:/var/www/html/storage/app/public
      - ./docker/app/php-production.ini:/usr/local/etc/php/conf.d/production.ini:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "db:show", "--no-interaction"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ── Queue workers (2 replicas, mirrors PM2 config) ───────────
  queue:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    environment:
      CONTAINER_ROLE: queue
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
      - ./docker/app/php-production.ini:/usr/local/etc/php/conf.d/production.ini:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2

  # ── Laravel Scheduler ────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    environment:
      CONTAINER_ROLE: scheduler
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
      - ./docker/app/php-production.ini:/usr/local/etc/php/conf.d/production.ini:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # ── Laravel Reverb WebSocket server ─────────────────────────
  reverb:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    environment:
      CONTAINER_ROLE: reverb
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
      - ./docker/app/php-production.ini:/usr/local/etc/php/conf.d/production.ini:ro
    depends_on:
      app:
        condition: service_healthy
    # Port 8080 NOT exposed to host — nginx proxies internally
    restart: unless-stopped

  # ── MySQL 8.0 ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # NOT exposed to host — only reachable inside Docker network
    restart: unless-stopped

  # ── Redis 7 ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # NOT exposed to host
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  redis_data:
  app_storage:
  app_public:
  app_storage_public:
