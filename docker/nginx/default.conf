# ─────────────────────────────────────────────────────────────
# HTTP — redirect to HTTPS + Let's Encrypt ACME challenge
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dialn.vedpragya.com;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────
# HTTPS — main application
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dialn.vedpragya.com;

    ssl_certificate     /etc/letsencrypt/live/dialn.vedpragya.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dialn.vedpragya.com/privkey.pem;
    include /etc/nginx/ssl-params.conf;

    root  /var/www/html/public;
    index index.php;

    client_max_body_size 64M;

    # ── Vite-built assets (immutable hashed filenames) ──────
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Embeddable widget assets ─────────────────────────────
    location /widget/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Laravel storage (user uploads, etc.) ─────────────────
    location /storage/ {
        try_files $uri =404;
    }

    # ── Custom logo / brand assets ───────────────────────────
    location /VB/ {
        try_files $uri =404;
    }

    # ── Laravel Reverb WebSocket (Pusher protocol) ───────────
    # Browser connects to wss://dialn.vedpragya.com/app/{key}
    location /app {
        proxy_pass         http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Reverb auth + presence endpoints
    location /apps/ {
        proxy_pass         http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Laravel health check (no auth required) ───────────────
    location = /up {
        try_files $uri /index.php?$query_string;
    }

    # ── All other requests → Laravel via PHP-FPM ─────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass          app:9000;
        fastcgi_index         index.php;
        fastcgi_param         SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param         HTTP_X_FORWARDED_PROTO $scheme;
        include               fastcgi_params;
        fastcgi_read_timeout  300;
        fastcgi_buffers       16 16k;
        fastcgi_buffer_size   32k;
    }

    # Deny dot-files (except ACME challenge handled above)
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;
}
